<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markson's Sales Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #2E4057;
  --navy-soft:   #41587a;
  --gold:        #9C8B58;
  --gold-deep:   #7e6f42;
  --burgundy:    #840000;
  --white:       #ffffff;
  --paper:       #f6f4ef;
  --ink:         #243140;
  --muted:       #5d6b7d;
  --faint:       #8a96a6;
  --green:       #15803d;
  --amber:       #b45309;
  --glass:       rgba(255,255,255,0.72);
  --glass-2:     rgba(255,255,255,0.52);
  --glass-brd:   rgba(255,255,255,0.85);
  --navy-brd:    rgba(46,64,87,0.12);
  --gold-brd:    rgba(156,139,88,0.32);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  color: var(--ink);
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  background:
    radial-gradient(1100px 620px at 14% -10%, rgba(46,64,87,0.14), transparent 60%),
    radial-gradient(960px 520px at 102% 0%, rgba(156,139,88,0.16), transparent 58%),
    radial-gradient(900px 760px at 86% 116%, rgba(132,0,0,0.06), transparent 60%),
    linear-gradient(165deg, #fbfaf7 0%, #eef0ee 52%, #f4f1ea 100%);
  background-attachment: fixed;
}

/* soft luminous specks for the airy space-age depth */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 22% 26%, rgba(46,64,87,0.16), transparent),
    radial-gradient(1px 1px at 68% 16%, rgba(156,139,88,0.22), transparent),
    radial-gradient(1px 1px at 44% 72%, rgba(46,64,87,0.12), transparent),
    radial-gradient(1px 1px at 88% 60%, rgba(156,139,88,0.16), transparent);
  opacity: 0.6;
}

/* ── Header ── */
header {
  position: relative;
  background: linear-gradient(135deg, rgba(255,255,255,0.78) 0%, rgba(255,255,255,0.62) 100%);
  backdrop-filter: blur(18px) saturate(125%);
  -webkit-backdrop-filter: blur(18px) saturate(125%);
  border-bottom: 1px solid rgba(156,139,88,0.30);
  padding: 22px 30px 20px;
  box-shadow: 0 6px 30px rgba(46,64,87,0.08);
}
.brand-lockup {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.brand-name {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--burgundy);
  line-height: 1;
}
.brand-name .apos { color: var(--burgundy); }
.brand-divider {
  display: flex;
  align-items: center;
  gap: 7px;
}
.brand-diamonds {
  color: var(--gold);
  font-size: 11px;
  letter-spacing: 2px;
}
.brand-sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--gold-deep);
  text-transform: uppercase;
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: 30px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.header-accent {
  width: 64px;
  height: 2px;
  margin-top: 10px;
  background: linear-gradient(90deg, var(--gold), rgba(156,139,88,0));
  border-radius: 2px;
}

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 350px 1fr;
  gap: 30px;
  padding: 34px 30px;
  max-width: 1140px;
  margin: 0 auto;
  position: relative;
}
@media (max-width: 760px) {
  .main { grid-template-columns: 1fr; }
}

/* ── Glass surfaces ── */
.panel, .program-card, .empty-state {
  background: linear-gradient(155deg, var(--glass), var(--glass-2));
  border: 1px solid var(--glass-brd);
  border-radius: 16px;
  backdrop-filter: blur(20px) saturate(135%);
  -webkit-backdrop-filter: blur(20px) saturate(135%);
  box-shadow:
    0 14px 40px rgba(46,64,87,0.12),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(46,64,87,0.04);
}

.panel { padding: 26px; }
.panel-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 22px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(156,139,88,0.22);
}

.field { margin-bottom: 17px; }
.field label {
  display: block;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 7px;
}
.input-wrap { position: relative; }
.input-wrap .prefix {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold-deep);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 14px;
  pointer-events: none;
}
input[type="number"] {
  width: 100%;
  background: rgba(255,255,255,0.75);
  border: 1px solid rgba(46,64,87,0.16);
  color: var(--navy);
  border-radius: 9px;
  padding: 11px 16px 11px 30px;
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type="number"]::placeholder { color: #a9b3c0; font-weight: 400; }
input[type="number"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(156,139,88,0.18);
}

.tax-display {
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--gold-deep);
  padding: 10px 0 10px 2px;
}

.divider {
  border: none;
  border-top: 1px solid rgba(156,139,88,0.22);
  margin: 22px 0;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}
.total-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.total-value {
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  font-weight: 600;
}
.total-row.grand-row { margin-top: 14px; }
.total-row.grand-row .total-label { color: var(--navy); font-size: 13px; font-weight: 700; }
.total-value.grand {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  color: var(--burgundy);
  font-weight: 700;
}

.reset-btn {
  width: 100%;
  margin-top: 22px;
  padding: 12px;
  background: rgba(46,64,87,0.04);
  border: 1px solid rgba(156,139,88,0.34);
  border-radius: 9px;
  color: var(--gold-deep);
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.reset-btn:hover {
  background: rgba(156,139,88,0.14);
  border-color: var(--gold);
  color: var(--navy);
}

/* ── Results panel ── */
.results { display: flex; flex-direction: column; gap: 18px; }

.program-card {
  padding: 24px 26px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.program-card.eligible {
  box-shadow:
    0 14px 40px rgba(46,64,87,0.12),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 3px 0 0 rgba(21,128,61,0.65);
}
.program-card.warning-card {
  box-shadow:
    0 14px 40px rgba(46,64,87,0.12),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 3px 0 0 rgba(180,83,9,0.65);
}
.program-card.ineligible { opacity: 0.62; }
.program-card:hover { transform: translateY(-2px); }

.program-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}
.program-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--navy);
  line-height: 1.35;
}
.program-provider {
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--gold-deep);
  margin-top: 5px;
  text-transform: uppercase;
}
.program-tag {
  font-family: 'Montserrat', sans-serif;
  font-size: 9.5px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.tag-eligible {
  background: rgba(21,128,61,0.12);
  color: var(--green);
  border: 1px solid rgba(21,128,61,0.35);
}
.tag-ineligible {
  background: rgba(46,64,87,0.06);
  color: var(--faint);
  border: 1px solid rgba(46,64,87,0.16);
}
.tag-warning {
  background: rgba(180,83,9,0.12);
  color: var(--amber);
  border: 1px solid rgba(180,83,9,0.35);
}

.program-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
  gap: 13px;
}
.program-stat {
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(46,64,87,0.08);
  border-radius: 11px;
  padding: 14px 15px;
}
.stat-label {
  font-size: 9.5px;
  color: var(--gold-deep);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 8px;
}
.stat-value {
  font-family: 'Montserrat', sans-serif;
  font-size: 19px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--navy);
  line-height: 1.15;
}
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-sub {
  font-size: 9.5px;
  color: var(--faint);
  margin-top: 4px;
  line-height: 1.45;
}

.ineligible-reason {
  margin-top: 12px;
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.5;
}

/* ── Empty state ── */
.empty-state {
  padding: 64px;
  text-align: center;
  color: var(--faint);
  font-family: 'Cinzel', serif;
  font-size: 15px;
  letter-spacing: 0.04em;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(156,139,88,0.40); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="brand-lockup">
    <div class="brand-name">M<span style="font-variant:small-caps;">arkson</span><span class="apos">'</span>S</div>
    <div class="brand-divider">
      <span class="brand-diamonds">&#9671;&#9671;&#9671;</span>
      <span class="brand-sub">Furniture &amp; Mattress</span>
    </div>
  </div>
  <div class="header-title">Sales Calculator</div>
  <div class="header-accent"></div>
</header>

<div class="main">

  <!-- Left: inputs -->
  <div>
    <div class="panel">
      <div class="panel-title">Sale Breakdown</div>

      <div class="field">
        <label>Product Price</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inProduct" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Delivery</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inDelivery" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Protection Plan</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inProtection" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Sales Tax Rate</label>
        <div class="tax-display">8%</div>
      </div>

      <hr class="divider">

      <div class="total-row">
        <span class="total-label">Subtotal</span>
        <span class="total-value" id="outSubtotal">-</span>
      </div>
      <div class="total-row">
        <span class="total-label">Tax</span>
        <span class="total-value" id="outTax">-</span>
      </div>
      <div class="total-row grand-row">
        <span class="total-label">Total Financed</span>
        <span class="total-value grand" id="outTotal">-</span>
      </div>

      <button class="reset-btn" onclick="resetAll()">Clear All Fields</button>
    </div>
  </div>

  <!-- Right: financing programs -->
  <div class="results" id="results">
    <div class="empty-state" id="emptyState" style="display:none;"></div>
  </div>

</div>

<script>
const PROGRAMS = [
  {
    id: 'deferred12',
    name: '0% Deferred Interest - 12 Months',
    type: 'deferred',
    months: 12,
    minPurchase: 500,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'deferred36',
    name: '0% Deferred Interest - 36 Months',
    type: 'deferred',
    months: 36,
    minPurchase: 3000,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'koalifi',
    name: 'Koalifi Lease-to-Own',
    type: 'lto',
    months: 12,
    factor: 2.1,
    provider: 'Koalifi',
    warning: false,
  },
  {
    id: 'acima',
    name: 'Acima Lease-to-Own',
    type: 'lto',
    months: 12,
    factor: 2.1,
    provider: 'Acima',
    warning: false,
  },
];

function fmt(n) {
  if (n === null || isNaN(n)) return '-';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtBig(n) {
  if (n === null || isNaN(n)) return '-';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function val(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) || v < 0 ? 0 : v;
}

function recalc() {
  const product    = val('inProduct');
  const delivery   = val('inDelivery');
  const protection = val('inProtection');
  const taxRate    = 8;

  const subtotal = product + delivery + protection;
  const taxAmount = subtotal * (taxRate / 100);
  const total = subtotal + taxAmount;

  // Update summary
  document.getElementById('outSubtotal').textContent = subtotal > 0 ? fmt(subtotal) : '—';
  document.getElementById('outTax').textContent = subtotal > 0 ? fmt(taxAmount) : '—';
  document.getElementById('outTotal').textContent = total > 0 ? fmt(total) : '—';

  // Render programs
  const results = document.getElementById('results');
  const empty = document.getElementById('emptyState');

  if (total <= 0) {
    [...results.querySelectorAll('.program-card')].forEach(el => el.remove());
    return;
  }

  PROGRAMS.forEach(prog => {
    let card = document.getElementById('card-' + prog.id);
    if (!card) {
      card = document.createElement('div');
      card.id = 'card-' + prog.id;
      card.className = 'program-card';
      results.appendChild(card);
    }
    renderCard(card, prog, total);
  });
}

function renderCard(card, prog, total) {
  let eligible = true;
  let ineligibleReason = '';

  if (prog.type === 'deferred' && total < prog.minPurchase) {
    eligible = false;
    ineligibleReason = `Minimum purchase of ${fmt(prog.minPurchase)} required. Current total is ${fmt(total)}.`;
  }

  // Build card classes
  card.className = 'program-card' + (eligible ? (prog.warning ? ' warning-card' : ' eligible') : ' ineligible');

  let statsHtml = '';

  if (eligible) {
    if (prog.type === 'deferred') {
      const monthly = total / prog.months;
      statsHtml = `
        <div class="program-grid">
          <div class="program-stat">
            <div class="stat-label">Monthly Payment</div>
            <div class="stat-value">${fmtBig(monthly)}</div>
            <div class="stat-sub">over ${prog.months} months</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Total Financed</div>
            <div class="stat-value green">${fmtBig(total)}</div>
            <div class="stat-sub">0% interest if paid in full</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Penalty APR</div>
            <div class="stat-value amber">${prog.penaltyAPR}%</div>
            <div class="stat-sub">if not paid off in time</div>
          </div>
        </div>`;
    } else if (prog.type === 'lto') {
      const totalCost = total * prog.factor;
      const biweekly = totalCost / 26;
      statsHtml = `
        <div class="program-grid">
          <div class="program-stat">
            <div class="stat-label">Biweekly Payment</div>
            <div class="stat-value">${fmtBig(biweekly)}</div>
            <div class="stat-sub">26 payments / year</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">90-Day Price</div>
            <div class="stat-value green">${fmtBig(total)}</div>
            <div class="stat-sub">same as paying cash</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Total Lease Cost</div>
            <div class="stat-value amber">${fmtBig(totalCost)}</div>
            <div class="stat-sub">${prog.factor}x factor - ${prog.months} months</div>
          </div>
        </div>`;
    }
  }

  const tagHtml = eligible
    ? (prog.warning
        ? `<span class="program-tag tag-warning">Conditions Apply</span>`
        : `<span class="program-tag tag-eligible">Eligible</span>`)
    : `<span class="program-tag tag-ineligible">Not Eligible</span>`;

  card.innerHTML = `
    <div class="program-header">
      <div>
        <div class="program-name">${prog.name}</div>
        <div class="program-provider">${prog.provider}</div>
      </div>
      ${tagHtml}
    </div>
    ${eligible ? statsHtml : `<div class="ineligible-reason">${ineligibleReason}</div>`}
  `;
}

function resetAll() {
  ['inProduct','inDelivery','inProtection'].forEach(id => {
    document.getElementById(id).value = '';
  });
  recalc();
}
</script>
</body>
</html>
