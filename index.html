<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Markson's Sales Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #2E4057;
  --navy-soft:   #41587a;
  --gold:        #9C8B58;
  --gold-deep:   #7e6f42;
  --gold-light:  #c8b576;
  --burgundy:    #840000;
  --burgundy-lt: #c0394a;
  --white:       #ffffff;
  --ink:         #243140;
  --muted:       #5d6b7d;
  --faint:       #8a96a6;
  --green:       #15803d;
  --amber:       #b45309;
  --glass:       rgba(255,255,255,0.96);
  --glass-2:     rgba(255,255,255,0.88);
  --glass-brd:   rgba(255,255,255,0.92);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  color: var(--ink);
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  background:
    radial-gradient(1100px 620px at 18% -10%, rgba(178,42,42,0.45), transparent 60%),
    radial-gradient(950px 520px at 102% 2%, rgba(156,139,88,0.20), transparent 58%),
    radial-gradient(900px 760px at 84% 116%, rgba(40,0,0,0.55), transparent 60%),
    linear-gradient(165deg, #6e0000 0%, #840000 50%, #560000 100%);
  background-attachment: fixed;
}

/* faint starfield shimmer for the space-age depth */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 18% 24%, rgba(255,255,255,0.18), transparent),
    radial-gradient(1px 1px at 67% 14%, rgba(200,181,118,0.20), transparent),
    radial-gradient(1px 1px at 41% 71%, rgba(255,255,255,0.12), transparent),
    radial-gradient(1px 1px at 88% 58%, rgba(255,255,255,0.10), transparent),
    radial-gradient(1px 1px at 9% 82%, rgba(200,181,118,0.16), transparent);
  opacity: 0.7;
}

/* ── Header (sits on the navy backdrop) ── */
header {
  position: relative;
  text-align: center;
  background: linear-gradient(135deg, rgba(90,0,0,0.55) 0%, rgba(60,0,0,0.5) 100%);
  backdrop-filter: blur(16px) saturate(120%);
  -webkit-backdrop-filter: blur(16px) saturate(120%);
  border-bottom: 1px solid rgba(156,139,88,0.28);
  padding: 26px 30px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.35);
}
.brand-name {
  font-family: 'Cinzel', serif;
  font-size: 31px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--white);
  line-height: 1.12;
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 5px;
}
.header-accent {
  width: 230px;
  max-width: 70%;
  height: 2px;
  margin: 14px auto;
  background: linear-gradient(90deg, rgba(200,181,118,0), var(--gold-light) 50%, rgba(200,181,118,0));
  border-radius: 2px;
}

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 350px 1fr;
  gap: 30px;
  padding: 34px 30px;
  max-width: 1140px;
  margin: 0 auto;
  position: relative;
}
@media (max-width: 760px) {
  .main { grid-template-columns: 1fr; }
}

/* ── White work-zone glass surfaces ── */
.panel, .program-card, .empty-state {
  background: linear-gradient(155deg, var(--glass), var(--glass-2));
  border: 1px solid var(--glass-brd);
  border-radius: 16px;
  backdrop-filter: blur(22px) saturate(140%);
  -webkit-backdrop-filter: blur(22px) saturate(140%);
  box-shadow:
    0 18px 44px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.panel { padding: 26px; }
.panel-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 22px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(156,139,88,0.24);
}

.field { margin-bottom: 17px; }
.field label {
  display: block;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 7px;
}
.input-wrap { position: relative; }
.input-wrap .prefix {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold-deep);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 14px;
  pointer-events: none;
}
input[type="number"] {
  width: 100%;
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(46,64,87,0.18);
  color: var(--navy);
  border-radius: 9px;
  padding: 11px 16px 11px 30px;
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type="number"]::placeholder { color: #a9b3c0; font-weight: 400; }
input[type="number"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(156,139,88,0.20);
}

.tax-display {
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--gold-deep);
  padding: 10px 0 10px 2px;
}

.divider {
  border: none;
  border-top: 1px solid rgba(156,139,88,0.24);
  margin: 22px 0;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}
.total-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.total-value {
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  font-weight: 600;
}
.total-row.grand-row { margin-top: 14px; }
.total-row.grand-row .total-label { color: var(--navy); font-size: 13px; font-weight: 700; }
.total-value.grand {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  color: var(--burgundy);
  font-weight: 700;
}

.reset-btn {
  width: 100%;
  margin-top: 22px;
  padding: 12px;
  background: rgba(46,64,87,0.04);
  border: 1px solid rgba(156,139,88,0.36);
  border-radius: 9px;
  color: var(--gold-deep);
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.reset-btn:hover {
  background: rgba(156,139,88,0.16);
  border-color: var(--gold);
  color: var(--navy);
}

/* ── Results panel ── */
.results { display: flex; flex-direction: column; gap: 18px; }

.program-card {
  padding: 24px 26px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.program-card.eligible {
  box-shadow:
    0 18px 44px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 3px 0 0 rgba(21,128,61,0.7);
}
.program-card.warning-card {
  box-shadow:
    0 18px 44px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 3px 0 0 rgba(180,83,9,0.7);
}
.program-card.ineligible { opacity: 0.55; }
.program-card:hover { transform: translateY(-2px); }

.program-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}
.program-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--navy);
  line-height: 1.35;
}
.program-provider {
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--gold-deep);
  margin-top: 5px;
  text-transform: uppercase;
}
.program-note {
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 400;
  font-style: italic;
  color: var(--faint);
  margin-top: 5px;
  line-height: 1.4;
  max-width: 340px;
}
.program-tag {
  font-family: 'Montserrat', sans-serif;
  font-size: 9.5px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.promo-badge {
  display: inline-block;
  font-family: 'Montserrat', sans-serif;
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #4d3f12;
  background: linear-gradient(135deg, #dccf95, #c8b576);
  border: 1px solid rgba(156,139,88,0.6);
  padding: 2px 8px;
  border-radius: 20px;
  vertical-align: middle;
  margin-left: 7px;
  white-space: nowrap;
}
.tag-eligible {
  background: rgba(21,128,61,0.12);
  color: var(--green);
  border: 1px solid rgba(21,128,61,0.38);
}
.tag-ineligible {
  background: rgba(46,64,87,0.06);
  color: var(--faint);
  border: 1px solid rgba(46,64,87,0.16);
}
.tag-warning {
  background: rgba(180,83,9,0.12);
  color: var(--amber);
  border: 1px solid rgba(180,83,9,0.38);
}

.program-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
  gap: 13px;
}
.program-stat {
  background: rgba(248,247,243,0.92);
  border: 1px solid rgba(46,64,87,0.10);
  border-radius: 11px;
  padding: 14px 15px;
}
.stat-label {
  font-size: 9.5px;
  color: var(--gold-deep);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 8px;
}
.stat-value {
  font-family: 'Montserrat', sans-serif;
  font-size: 19px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--navy);
  line-height: 1.15;
}
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }

/* Lease-to-Own payment-frequency selector (dropdown — mobile-safe) */
.freq-select {
  width: 100%;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--navy);
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(46,64,87,0.22);
  border-radius: 6px;
  padding: 6px 8px;
  margin-bottom: 9px;
  cursor: pointer;
  outline: none;
}
.freq-select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(156,139,88,0.18);
}
.stat-sub {
  font-size: 9.5px;
  color: var(--faint);
  margin-top: 4px;
  line-height: 1.45;
}

.ineligible-reason {
  margin-top: 12px;
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.5;
}

/* ── Empty state ── */
.empty-state {
  padding: 64px;
  text-align: center;
  color: var(--faint);
  font-family: 'Cinzel', serif;
  font-size: 15px;
  letter-spacing: 0.04em;
}

/* ── Preview banner ── */
.preview-banner {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 9999;
  background: linear-gradient(135deg, #dccf95, #c8b576);
  color: #2E4057;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-align: center;
  padding: 11px 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.35);
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(156,139,88,0.45); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="header-accent"></div>
  <div class="brand-name">Markson's Furniture &amp; Mattress</div>
  <div class="header-title">Sales Calculator</div>
  <div class="header-accent"></div>
</header>

<div class="main">

  <!-- Left: inputs -->
  <div>
    <div class="panel">
      <div class="panel-title">Sale Breakdown</div>

      <div class="field">
        <label>Product Price</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inProduct" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Delivery</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inDelivery" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Protection Plan</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inProtection" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Discount</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inDiscount" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <hr class="divider">

      <div class="total-row">
        <span class="total-label">Subtotal</span>
        <span class="total-value" id="outSubtotal">-</span>
      </div>
      <div class="total-row" id="discountRow" style="display:none;">
        <span class="total-label">Discount</span>
        <span class="total-value" id="outDiscount" style="color:#e0556b;">-</span>
      </div>
      <div class="total-row">
        <span class="total-label">Tax</span>
        <span class="total-value" id="outTax">-</span>
      </div>
      <div class="total-row grand-row">
        <span class="total-label">Total</span>
        <span class="total-value grand" id="outTotal">-</span>
      </div>

      <button class="reset-btn" onclick="resetAll()">Clear All Fields</button>
    </div>
  </div>

  <!-- Right: financing programs -->
  <div class="results" id="results">
    <div class="empty-state" id="emptyState" style="display:none;"></div>
  </div>

</div>

<script>
// Bread Financial "Q3 Special" — the 15 selected dates from the schedule.
const Q3_SPECIAL_DATES = [
  '2026-08-07', '2026-08-08', '2026-08-10',
  '2026-08-21', '2026-08-22', '2026-08-24',
  '2026-08-28', '2026-08-29', '2026-08-31',
  '2026-09-11', '2026-09-12', '2026-09-14',
  '2026-09-18', '2026-09-19', '2026-09-21',
];

const PROGRAMS = [
  {
    id: 'deferred12',
    name: '0% Deferred Interest - 12 Months',
    type: 'deferred',
    months: 12,
    minPurchase: 500,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'deferred24',
    name: '0% Deferred Interest - 24 Months',
    type: 'deferred',
    months: 24,
    minPurchase: 2000,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'deferred36',
    name: '0% Deferred Interest - 36 Months',
    type: 'deferred',
    months: 36,
    minPurchase: 3000,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'deferred48',
    name: '0% Deferred Interest - 48 Months',
    type: 'deferred',
    months: 48,
    minPurchase: 4000,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'lto',
    name: 'Lease to Own',
    type: 'lto',
    months: 12,
    factor: 2.201,  // tuned so $1,000 pre-tax ≈ $91.43 biweekly (incl. 8% tax)
    note: 'Payments close estimates. Exact, final payments at time of signing.',
    warning: false,
  },

  // ───────── Q3 2026 PROMO PLANS (date-driven) ─────────
  // From the "Q3 Bread" schedule. Bread Financial is the issuing bank;
  // "Nest Credit Card" is what the customer sees, so these match the
  // everyday Nest cards above. Each card only shows on its promo dates.
  // (Bread plan #s kept in the id for staff reference: 418, 860, 424,
  //  848, 412, 848, 860.)

  // July 4th window — Jul 1–8, all 7 days
  {
    id: 'jul418', type: 'bread', kind: 'deferred',
    name: '0% Deferred Interest - 18 Months',
    provider: 'Nest Credit Card',
    months: 18, minPurchase: 1500, penaltyAPR: 29.99, badge: 'July 4th', warning: false,
    availableFrom: '2026-07-01', availableUntil: '2026-07-08',
  },
  {
    id: 'jul860', type: 'bread', kind: 'equal',
    name: 'No Interest - 60 Months',
    provider: 'Nest Credit Card',
    months: 60, minPurchase: 4000, badge: 'July 4th', warning: false,
    availableFrom: '2026-07-01', availableUntil: '2026-07-08',
  },

  // Labor Day window — Sep 3–9, all 7 days
  {
    id: 'lab424', type: 'bread', kind: 'deferred',
    name: '0% Deferred Interest - 24 Months',
    provider: 'Nest Credit Card',
    months: 24, minPurchase: 1500, penaltyAPR: 29.99, badge: 'Labor Day', warning: false,
    availableFrom: '2026-09-03', availableUntil: '2026-09-09',
  },
  {
    id: 'lab848', type: 'bread', kind: 'equal',
    name: 'No Interest - 48 Months',
    provider: 'Nest Credit Card',
    months: 48, minPurchase: 3000, badge: 'Labor Day', warning: false,
    availableFrom: '2026-09-03', availableUntil: '2026-09-09',
  },

  // Q3 Special — only on the 15 selected dates above
  {
    id: 'q3_412', type: 'bread', kind: 'deferred',
    name: '0% Deferred Interest - 12 Months',
    provider: 'Nest Credit Card',
    months: 12, penaltyAPR: 29.99, badge: 'Q3 Special', warning: false,
    availableDates: Q3_SPECIAL_DATES,
  },
  {
    id: 'q3_848', type: 'bread', kind: 'equal',
    name: 'No Interest - 48 Months',
    provider: 'Nest Credit Card',
    months: 48, minPurchase: 4000, badge: 'Q3 Special', warning: false,
    availableDates: Q3_SPECIAL_DATES,
  },
  {
    id: 'q3_860', type: 'bread', kind: 'equal',
    name: 'No Interest - 60 Months',
    provider: 'Nest Credit Card',
    months: 60, minPurchase: 5000, badge: 'Q3 Special', warning: false,
    availableDates: Q3_SPECIAL_DATES,
  },
];

// Lease-to-Own payment frequencies (12-month term).
const LTO_FREQS = {
  weekly:   { divisor: 52, label: '52 payments / year' },
  biweekly: { divisor: 26, label: '26 payments / year' },
  monthly:  { divisor: 12, label: '12 payments / year' },
};
const ltoState = {}; // remembers the chosen frequency per program

function setLtoFreq(progId, freq) {
  ltoState[progId] = freq;
  recalc();
}

// ── Date preview: append ?date=YYYY-MM-DD to the URL to see the page as it
// will look on that day. No parameter = the device's real date (live).
function getPreviewDate() {
  try {
    const p = new URLSearchParams(location.search).get('date');
    if (p && /^\d{4}-\d{2}-\d{2}$/.test(p)) return p;
  } catch (e) {}
  return null;
}
const PREVIEW_DATE = getPreviewDate();
function nowDate() {
  return PREVIEW_DATE ? new Date(PREVIEW_DATE + 'T12:00:00') : new Date();
}

// A program is a "dated special" if it carries any date rule.
function isDateGated(p) {
  return !!(p.availableFrom || p.availableUntil || p.availableDates || p.daysOfWeek);
}

// Date-based availability. A program card shows only if ALL set rules pass:
//   availableFrom  "YYYY-MM-DD"  — don't show before this date
//   availableUntil "YYYY-MM-DD"  — don't show after this date
//   daysOfWeek     [0..6]        — only show on these weekdays (0=Sun … 6=Sat)
//   availableDates ["YYYY-MM-DD"] — only show on these exact dates
// With none set (the default), the card always shows.
function isAvailable(prog) {
  const now = nowDate();
  const today = new Date(now);
  today.setHours(0, 0, 0, 0);
  if (prog.availableFrom && today < new Date(prog.availableFrom + 'T00:00:00')) return false;
  if (prog.availableUntil && today > new Date(prog.availableUntil + 'T23:59:59')) return false;
  if (prog.daysOfWeek && !prog.daysOfWeek.includes(now.getDay())) return false;
  if (prog.availableDates) {
    const iso = today.getFullYear() + '-' +
      String(today.getMonth() + 1).padStart(2, '0') + '-' +
      String(today.getDate()).padStart(2, '0');
    if (!prog.availableDates.includes(iso)) return false;
  }
  return true;
}

function fmt(n) {
  if (n === null || isNaN(n)) return '-';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtBig(n) {
  if (n === null || isNaN(n)) return '-';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function val(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) || v < 0 ? 0 : v;
}

function recalc() {
  const product    = val('inProduct');
  const delivery   = val('inDelivery');
  const protection = val('inProtection');
  const discount   = val('inDiscount');
  const taxRate    = 8;

  const subtotal = product + delivery + protection;
  const discounted = Math.max(0, subtotal - discount);   // discount comes off before tax
  const taxAmount = discounted * (taxRate / 100);
  const total = discounted + taxAmount;

  // Update summary
  document.getElementById('outSubtotal').textContent = subtotal > 0 ? fmt(subtotal) : '—';
  const discRow = document.getElementById('discountRow');
  if (discount > 0) {
    discRow.style.display = 'flex';
    document.getElementById('outDiscount').textContent = '−' + fmt(discount);
  } else {
    discRow.style.display = 'none';
  }
  document.getElementById('outTax').textContent = subtotal > 0 ? fmt(taxAmount) : '—';
  document.getElementById('outTotal').textContent = total > 0 ? fmt(total) : '—';

  // Render programs
  const results = document.getElementById('results');
  const empty = document.getElementById('emptyState');

  if (total <= 0) {
    [...results.querySelectorAll('.program-card')].forEach(el => el.remove());
    return;
  }

  // Is any dated special live right now? If so, of the everyday cards only the
  // 12-month term (and Lease to Own) stays; the 24/36/48-month ones are hidden.
  const specialLive = PROGRAMS.some(p => isDateGated(p) && isAvailable(p));

  PROGRAMS.forEach(prog => {
    let card = document.getElementById('card-' + prog.id);
    const hiddenBySpecial = specialLive && !isDateGated(prog) && prog.months !== 12 && prog.type !== 'lto';
    if (!isAvailable(prog) || hiddenBySpecial) {   // outside its window, or an everyday card suppressed while a special runs
      if (card) card.remove();
      return;
    }
    if (!card) {
      card = document.createElement('div');
      card.id = 'card-' + prog.id;
      card.className = 'program-card';
      results.appendChild(card);
    }
    renderCard(card, prog, total);
  });

  // Always keep Lease to Own pinned to the bottom, whatever else is showing.
  const ltoCard = document.getElementById('card-lto');
  if (ltoCard) results.appendChild(ltoCard);
}

function renderCard(card, prog, total) {
  let eligible = true;
  let ineligibleReason = '';

  if (prog.minPurchase && total < prog.minPurchase) {
    eligible = false;
    ineligibleReason = `Minimum purchase of ${fmt(prog.minPurchase)} required. Current total is ${fmt(total)}.`;
  }
  if (prog.months >= 36 && val('inDiscount') > 0) {
    eligible = false;
    ineligibleReason = 'Not available when a discount is applied.';
  }

  // Build card classes
  card.className = 'program-card' + (eligible ? (prog.warning ? ' warning-card' : ' eligible') : ' ineligible');

  let statsHtml = '';

  if (eligible) {
    if (prog.type === 'deferred') {
      const monthly = total / prog.months;
      statsHtml = `
        <div class="program-grid">
          <div class="program-stat">
            <div class="stat-label">Monthly Payment</div>
            <div class="stat-value">${fmtBig(monthly)}</div>
            <div class="stat-sub">over ${prog.months} months</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Total</div>
            <div class="stat-value green">${fmtBig(total)}</div>
            <div class="stat-sub">0% interest if paid in full</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Penalty APR</div>
            <div class="stat-value amber">${prog.penaltyAPR}%</div>
            <div class="stat-sub">if not paid off in time</div>
          </div>
        </div>`;
    } else if (prog.type === 'lto') {
      const totalCost = total * prog.factor;
      const sel = ltoState[prog.id] || 'biweekly';
      const freq = LTO_FREQS[sel];
      const payment = totalCost / freq.divisor;
      statsHtml = `
        <div class="program-grid">
          <div class="program-stat">
            <select class="freq-select" onchange="setLtoFreq('${prog.id}', this.value)">
              <option value="weekly" ${sel==='weekly'?'selected':''}>Weekly</option>
              <option value="biweekly" ${sel==='biweekly'?'selected':''}>Biweekly</option>
              <option value="monthly" ${sel==='monthly'?'selected':''}>Monthly</option>
            </select>
            <div class="stat-value">${fmtBig(payment)}</div>
            <div class="stat-sub">${freq.label}</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">90-Day Price</div>
            <div class="stat-value green">${fmtBig(total)}</div>
            <div class="stat-sub">same as paying cash</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Total Lease Cost</div>
            <div class="stat-value amber">${fmtBig(totalCost)}</div>
            <div class="stat-sub">${(+prog.factor).toFixed(1)}x factor - ${prog.months} months</div>
          </div>
        </div>`;
    } else if (prog.type === 'bread') {
      const monthly = total / prog.months;
      if (prog.kind === 'deferred') {
        // Identical layout to the everyday deferred-interest cards
        statsHtml = `
          <div class="program-grid">
            <div class="program-stat">
              <div class="stat-label">Monthly Payment</div>
              <div class="stat-value">${fmtBig(monthly)}</div>
              <div class="stat-sub">over ${prog.months} months</div>
            </div>
            <div class="program-stat">
              <div class="stat-label">Total</div>
              <div class="stat-value green">${fmtBig(total)}</div>
              <div class="stat-sub">0% interest if paid in full</div>
            </div>
            <div class="program-stat">
              <div class="stat-label">Penalty APR</div>
              <div class="stat-value amber">${prog.penaltyAPR}%</div>
              <div class="stat-sub">if not paid off in time</div>
            </div>
          </div>`;
      } else {
        statsHtml = `
          <div class="program-grid">
            <div class="program-stat">
              <div class="stat-label">Monthly Payment</div>
              <div class="stat-value">${fmtBig(monthly)}</div>
              <div class="stat-sub">over ${prog.months} months</div>
            </div>
            <div class="program-stat">
              <div class="stat-label">Total</div>
              <div class="stat-value green">${fmtBig(total)}</div>
              <div class="stat-sub">no interest · equal monthly payments</div>
            </div>
          </div>`;
      }
    }
  }

  const tagHtml = eligible
    ? (prog.warning
        ? `<span class="program-tag tag-warning">Conditions Apply</span>`
        : `<span class="program-tag tag-eligible">Eligible</span>`)
    : `<span class="program-tag tag-ineligible">Not Eligible</span>`;

  card.innerHTML = `
    <div class="program-header">
      <div>
        <div class="program-name">${prog.name}${prog.badge ? ` <span class="promo-badge">${prog.badge}</span>` : ''}</div>
        ${prog.provider ? `<div class="program-provider">${prog.provider}</div>` : ''}
        ${prog.note ? `<div class="program-note">${prog.note}</div>` : ''}
      </div>
      ${tagHtml}
    </div>
    ${eligible ? statsHtml : `<div class="ineligible-reason">${ineligibleReason}</div>`}
  `;
}

function resetAll() {
  ['inProduct','inDelivery','inProtection','inDiscount'].forEach(id => {
    document.getElementById(id).value = '';
  });
  recalc();
}

// When viewing a simulated date, show a clear banner so a preview is never
// mistaken for the live page.
if (PREVIEW_DATE) {
  const b = document.createElement('div');
  b.className = 'preview-banner';
  b.textContent = 'PREVIEW — showing ' +
    nowDate().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) +
    '   ·   remove “?date=…” from the address bar for the live view';
  document.body.appendChild(b);
}
</script>
</body>
